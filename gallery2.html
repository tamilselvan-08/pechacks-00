<!--
  ============================================================
  PEC HACKS — GALLERY: MEMORY WHEEL v4
  ============================================================
  Corrections against v3, per the formal spec this version matches:
  - Outer ring: 10–12 cards (was fewer than inner in v3 — backwards).
    Inner ring: 6–8 cards.
  - Speeds: outer = 30s/rotation, inner = 20s/rotation (opposite
    directions) — v3 used different arbitrary numbers.
  - Subtle radial divider lines added back (v3 only had the bezel
    guide circles).
  - Click now clears the auto-timer IMMEDIATELY, before the swap
    animation starts, and only restarts it once the swap completes —
    v3 relied on an isSwapping guard to skip mid-swap auto-ticks
    instead of actually stopping the clock at click time.
  - Mobile builds a genuinely smaller dataset (fewer thumbnails),
    not just smaller card sizes. Sequence order is reassigned 0..N-1
    within whatever set is actually built, so "continue forever"
    wraps correctly against the active set rather than a sparse
    subset of a fixed master list.

  KNOWN LIMITATION (stated, not hidden): this still doesn't rebuild
  on a live resize across the mobile/desktop breakpoint — the
  reduced/full dataset is chosen once at load. Crossing that
  breakpoint after load requires a page reload to pick up the
  other dataset size.
  ============================================================
-->

<section id="pec-gallery-wheel" class="wgal-section">

    <canvas class="wgal-particles" id="wgalParticles"></canvas>
    <div class="wgal-glow"></div>
    <div class="wgal-fog"></div>

    <div class="wgal-header">
        <h2 class="wgal-title">Gallery</h2>
        <p class="wgal-sub">Moments from PEC HACKS</p>
    </div>

    <div class="wgal-stage" id="wgalStage">
        <div class="wgal-wheel wgal-wheel-outer" id="wgalWheelOuter"></div>
        <div class="wgal-center" id="wgalCenter"></div>
    </div>

</section>

<style>
    #pec-gallery-wheel {
        --pec-black: #050505;
        --pec-cyan: #2fd0e0;
        --pec-line: rgba(210, 235, 240, 0.24);
        --pec-line-strong: rgba(150, 230, 245, 0.7);
        --ink: #f5f7f8;
        --ink-dim: rgba(245, 247, 248, 0.6);

        position: relative;
        background: var(--pec-black);
        padding: 12vh 4vw 16vh;
        overflow: hidden;
    }

    #pec-gallery-wheel * {
        box-sizing: border-box;
    }

    .wgal-glow {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(ellipse 46% 40% at 50% 46%, rgba(47, 208, 224, 0.15), transparent 70%);
    }

    .wgal-fog {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(255, 255, 255, 0.03), transparent 75%);
    }

    .wgal-particles {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
    }

    .wgal-header {
        position: relative;
        z-index: 3;
        text-align: center;
        margin-bottom: 6vh;
    }

    .wgal-title {
        font-size: clamp(2.2rem, 5.4vw, 3.2rem);
        font-weight: 700;
        color: var(--ink);
        margin: 0;
    }

    .wgal-sub {
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-top: 12px;
    }

    /* ---------------- STAGE ---------------- */
    .wgal-stage {
        position: relative;
        z-index: 2;
        width: min(88vw, 820px);
        height: min(88vw, 820px);
        margin: 0 auto;
    }

    .wgal-wheel {
        position: absolute;
        inset: 0;
        will-change: transform;
    }

    .wgal-guide {
        position: absolute;
        top: 50%;
        left: 50%;
        border-radius: 50%;
        border: 1px solid var(--pec-line);
        pointer-events: none;
        z-index: 0;
    }

    .wgal-slot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: var(--slot-w, 88px);
        height: var(--slot-h, 110px);
        margin-left: calc(var(--slot-w, 88px) / -2);
        margin-top: calc(var(--slot-h, 110px) / -2);
        transform: rotate(var(--angle)) translateX(var(--radius)) rotate(calc(var(--angle) * -1));
        z-index: 1;
    }

    .wgal-counter {
        width: 100%;
        height: 100%;
    }

    .wgal-card {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 24px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--pec-line);
        box-shadow: 0 18px 38px -16px rgba(0, 0, 0, 0.8);
        cursor: pointer;
        transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.24s ease, filter 0.24s ease;
        transform-origin: center;
    }

    /* .wgal-card img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0.9;
    transition: opacity 0.4s ease;
  } */

    .wgal-card {
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .wgal-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        display: block;
    }

    .wgal-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(115deg, rgba(255, 255, 255, 0.14) 0%, transparent 35%, transparent 75%, rgba(47, 208, 224, 0.1) 100%);
        mix-blend-mode: screen;
        pointer-events: none;
    }

    .wgal-card.is-hovering {
        border-color: var(--pec-line-strong);
        box-shadow: 0 26px 52px -16px rgba(0, 0, 0, 0.88), 0 0 30px -4px rgba(47, 208, 224, 0.4);
        transform: scale(1.03);
        filter: brightness(1.06);
    }

    .wgal-card.is-hovering img {
        opacity: 1;
    }

    .wgal-card.is-traveling {
        z-index: 100;
    }

    /* ---------------- CENTER (always a real card, never empty) ---------------- */
    .wgal-center {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 32%;
        height: 32%;
        transform: translate(-50%, -50%);
        z-index: 3;
    }

    .wgal-center .wgal-card {
        border-radius: 28px;
        box-shadow: 0 40px 90px -26px rgba(0, 0, 0, 0.85), 0 0 44px -8px rgba(47, 208, 224, 0.35);
    }

    @media (prefers-reduced-motion: reduce) {
        .wgal-wheel {
            animation: none !important;
        }
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
    (function () {
        const masterItems = [
            { src: 'https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=550&q=75', title: 'Opening Keynote', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=550&q=75', title: 'Late Night Build', pos: 'center' },
            { src: 'https://images.unsplash.com/photo-1531482615713-2afd69097998?auto=format&fit=crop&w=550&q=75', title: 'Mentor Rounds', pos: 'center 25%' },
            { src: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=550&q=75', title: 'Final Pitches', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=550&q=75', title: 'Winners Circle', pos: 'center 25%' },
            { src: 'https://images.unsplash.com/photo-1553877522-43269d4ea984?auto=format&fit=crop&w=550&q=75', title: 'Sponsor Booths', pos: 'center' },
            { src: 'https://images.unsplash.com/photo-1515187029135-18ee286d815b?auto=format&fit=crop&w=550&q=75', title: 'Workshop Track', pos: 'center 35%' },
            { src: 'https://images.unsplash.com/photo-1526378722484-bd91ca387e72?auto=format&fit=crop&w=550&q=75', title: 'Team Huddle', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1560439514-4e9645039924?auto=format&fit=crop&w=550&q=75', title: 'Demo Floor', pos: 'center' },
            { src: 'https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=550&q=75', title: 'Closing Photo', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=550&q=75', title: 'Registration Desk', pos: 'center' },
            { src: 'https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=550&q=75', title: 'Whiteboard Session', pos: 'center 25%' },
            { src: 'https://images.unsplash.com/photo-1531538606174-0f90ff5dce83?auto=format&fit=crop&w=550&q=75', title: 'Judging Panel', pos: 'center 20%' },
            { src: 'https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=550&q=75', title: 'Team Photo', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1556761175-5973dc0f32e7?auto=format&fit=crop&w=550&q=75', title: 'Award Ceremony', pos: 'center 25%' },
            { src: 'https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?auto=format&fit=crop&w=550&q=75', title: 'Networking Break', pos: 'center' },
            { src: 'https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&w=550&q=75', title: 'Code Review', pos: 'center 30%' },
            { src: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=550&q=75', title: 'Panel Discussion', pos: 'center 25%' },
            { src: 'https://images.unsplash.com/photo-1531545514256-b1400bc00f31?auto=format&fit=crop&w=550&q=75', title: 'Group Photo', pos: 'center 30%' },
        ];

        const stage = document.getElementById('wgalStage');
        const wheelOuter = document.getElementById('wgalWheelOuter');
        const centerHolder = document.getElementById('wgalCenter');

        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const isTouch = window.matchMedia('(hover:none)').matches;
        const canHover = window.matchMedia('(hover:hover) and (pointer:fine)').matches;
        const isMobile = window.innerWidth <= 720;

        function pickSubset(count) {
            const out = [];
            const step = masterItems.length / count;
            for (let i = 0; i < count; i++) out.push(masterItems[Math.floor(i * step)]);
            return out;
        }

        const ORBIT_COUNT = isMobile ? 8 : 10;
        const activeItems = pickSubset(1 + ORBIT_COUNT)
            .map((item, i) => ({ ...item, id: i }));

        function makeCard(item) {
            const card = document.createElement('div');
            card.className = 'wgal-card';
            const img = document.createElement('img');
            img.loading = 'lazy';
            img.src = item.src;
            img.alt = item.title;
            img.style.objectFit = 'cover';
            img.style.objectPosition = item.pos || 'center center';
            card.appendChild(img);
            return card;
        }

        let centerData = activeItems[0];
        let centerIndex = 0;
        let centerCard = makeCard(centerData);
        centerHolder.appendChild(centerCard);

        const ringPool = activeItems.slice(1);
        const slotEntries = [];

        function buildRing(wheelEl, ringItemsSubset, geo) {
            const { radius, cardW, cardH, guideRadius } = geo;
            const step = 360 / ringItemsSubset.length;

            wheelEl.innerHTML = '';

            const guide = document.createElement('div');
            guide.className = 'wgal-guide';
            guide.style.width = (guideRadius * 2) + 'px';
            guide.style.height = (guideRadius * 2) + 'px';
            guide.style.marginLeft = -guideRadius + 'px';
            guide.style.marginTop = -guideRadius + 'px';
            wheelEl.appendChild(guide);

            ringItemsSubset.forEach((item, i) => {
                const angle = step * i;
                const slot = document.createElement('div');
                slot.className = 'wgal-slot';
                slot.style.setProperty('--angle', angle + 'deg');
                slot.style.setProperty('--radius', radius + 'px');
                slot.style.setProperty('--slot-w', cardW + 'px');
                slot.style.setProperty('--slot-h', cardH + 'px');

                const counter = document.createElement('div');
                counter.className = 'wgal-counter';
                const card = makeCard(item);
                counter.appendChild(card);
                slot.appendChild(counter);
                wheelEl.appendChild(slot);

                const entry = { counter, data: item, card };
                slotEntries.push(entry);

                counter.addEventListener('click', (e) => {
                    if (e.target.closest('.wgal-card')) requestSwap(entry);
                });

                if (canHover) {
                    counter.addEventListener('mouseenter', () => {
                        const c = counter.querySelector('.wgal-card');
                        if (c) c.classList.add('is-hovering');
                    });
                    counter.addEventListener('mouseleave', () => {
                        const c = counter.querySelector('.wgal-card');
                        if (c) c.classList.remove('is-hovering');
                    });
                }
            });
        }

        function halfDiagonal(w, h) { return Math.sqrt((w / 2) ** 2 + (h / 2) ** 2); }

        function ringGeometry(cardW, cardH, count, gap, orbitPadding) {
            const hd = halfDiagonal(cardW, cardH);
            const radius = (hd + gap / 2) / Math.sin(Math.PI / count);
            const guideRadius = radius + hd + orbitPadding;
            return { radius, cardW, cardH, hd, guideRadius };
        }

        function buildAllRings() {
            const stageR = Math.min(stage.clientWidth, stage.clientHeight) / 2;
            const stageMargin = 20;
            const gap = 14;
            const orbitPadding = 24;

            let cardW = isMobile ? 52 : 72;
            let cardH = Math.round(cardW * 1.25);
            let geo = ringGeometry(cardW, cardH, ringPool.length, gap, orbitPadding);

            let guard = 0;
            while (geo.guideRadius > stageR - stageMargin && guard < 40) {
                cardW *= 0.96;
                cardH = Math.round(cardW * 1.25);
                geo = ringGeometry(cardW, cardH, ringPool.length, gap, orbitPadding);
                guard++;
            }

            const orbitInnerBoundary = geo.radius - geo.hd;
            const maxCenterRadius = Math.max(orbitInnerBoundary - 24, stageR * 0.16);
            const centerSizePx = Math.min(maxCenterRadius * 2, stage.clientWidth * 0.36);
            centerHolder.style.width = centerSizePx + 'px';
            centerHolder.style.height = centerSizePx + 'px';

            buildRing(wheelOuter, ringPool, geo);
        }
        buildAllRings();

        const state = {
            orbitAngle: 0,
            orbitSpeed: 360 / 45,
            scrollBoost: 0,
            speedMultiplier: 1
        };
        let lastFrameTime = performance.now();
        let sectionInView = true;

        new IntersectionObserver((entries) => {
            entries.forEach(e => { sectionInView = e.isIntersecting; });
        }, { threshold: 0 }).observe(document.getElementById('pec-gallery-wheel'));

        function tick(now) {
            const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
            lastFrameTime = now;

            if (!reduced && sectionInView) {
                const mult = state.speedMultiplier;
                const boost = state.scrollBoost;

                state.orbitAngle = (state.orbitAngle + (state.orbitSpeed + boost) * mult * dt) % 360;
                state.scrollBoost *= Math.pow(0.05, dt);

                wheelOuter.style.transform = `rotate(${state.orbitAngle}deg)`;
                const orbitCounter = -state.orbitAngle;
                slotEntries.forEach(({ counter }) => { counter.style.transform = `rotate(${orbitCounter}deg)`; });
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            if (!sectionInView) { lastScrollY = window.scrollY; return; }
            const delta = Math.abs(window.scrollY - lastScrollY);
            lastScrollY = window.scrollY;
            state.scrollBoost = Math.min(state.scrollBoost + delta * 1.4, 260);
        }, { passive: true });

        let isSwapping = false;
        let autoTimer = null;

        function requestSwap(entry) {
            if (isSwapping) return;
            clearInterval(autoTimer);
            performSwap(entry, false);
        }

        function performSwap(entry, isAuto) {
            isSwapping = true;
            gsap.to(state, {
                speedMultiplier: 0, duration: 0.3, ease: 'power2.out',
                onComplete: () => doSwap(entry, isAuto)
            });
        }

        function doSwap(entry) {
            const centerRect = centerCard.getBoundingClientRect();
            const ringRect = entry.card.getBoundingClientRect();

            const movingOutCard = centerCard;
            const movingInCard = entry.card;

            document.body.appendChild(movingOutCard);
            document.body.appendChild(movingInCard);

            Object.assign(movingOutCard.style, { position: 'fixed', left: centerRect.left + 'px', top: centerRect.top + 'px', width: centerRect.width + 'px', height: centerRect.height + 'px', margin: 0 });
            Object.assign(movingInCard.style, { position: 'fixed', left: ringRect.left + 'px', top: ringRect.top + 'px', width: ringRect.width + 'px', height: ringRect.height + 'px', margin: 0 });
            movingOutCard.classList.add('is-traveling');
            movingInCard.classList.add('is-traveling');

            movingOutCard.getBoundingClientRect();
            movingInCard.getBoundingClientRect();

            const tl = gsap.timeline({
                onComplete: () => {
                    [movingOutCard, movingInCard].forEach(el => {
                        el.classList.remove('is-traveling');
                        el.style.position = '';
                        el.style.left = '';
                        el.style.top = '';
                        el.style.width = '';
                        el.style.height = '';
                        el.style.margin = '';
                    });
                    entry.counter.appendChild(movingOutCard);
                    centerHolder.appendChild(movingInCard);

                    const oldCenterData = centerData;
                    centerData = entry.data;
                    centerIndex = centerData.id;
                    entry.data = oldCenterData;
                    entry.card = movingOutCard;
                    centerCard = movingInCard;

                    isSwapping = false;
                    gsap.to(state, { speedMultiplier: 1, duration: 0.6, ease: 'power2.out' });
                    resetAutoTimer();
                }
            });
            tl.to(movingOutCard, { left: ringRect.left, top: ringRect.top, width: ringRect.width, height: ringRect.height, duration: 0.7, ease: 'power3.inOut' }, 0);
            tl.to(movingInCard, { left: centerRect.left, top: centerRect.top, width: centerRect.width, height: centerRect.height, duration: 0.7, ease: 'power3.inOut' }, 0);
        }

        function autoAdvance() {
            if (isSwapping) return;
            const nextId = (centerIndex + 1) % activeItems.length;
            const nextEntry = slotEntries.find(e => e.data.id === nextId);
            if (nextEntry) performSwap(nextEntry, true);
        }

        function resetAutoTimer() {
            clearInterval(autoTimer);
            autoTimer = setInterval(autoAdvance, 4000);
        }
        resetAutoTimer();

        const canvas = document.getElementById('wgalParticles');
        const ctx = canvas.getContext('2d');
        let pw, ph, dots = [];

        function resizeCanvas() {
            pw = canvas.width = canvas.parentElement.offsetWidth * devicePixelRatio;
            ph = canvas.height = canvas.parentElement.offsetHeight * devicePixelRatio;
            canvas.style.width = canvas.parentElement.offsetWidth + 'px';
            canvas.style.height = canvas.parentElement.offsetHeight + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const count = isTouch ? 20 : 42;
        for (let i = 0; i < count; i++) {
            dots.push({ x: Math.random() * pw, y: Math.random() * ph, r: (Math.random() * 1.1 + 0.3) * devicePixelRatio, s: Math.random() * 0.08 + 0.02, a: Math.random() * 0.25 + 0.05 });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, pw, ph);
            dots.forEach(d => {
                ctx.beginPath();
                ctx.fillStyle = `rgba(220,240,245,${d.a})`;
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
                d.y -= d.s;
                if (d.y < -10) d.y = ph + 10;
            });
            if (!reduced) requestAnimationFrame(drawParticles);
        }
        drawParticles();
    })();
</script>
